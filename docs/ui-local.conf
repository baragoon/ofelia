[job-local "ui-demo"]
schedule = @every 30s
command = date

[job-local "ui-multiline-demo"]
schedule = @hourly
; Use an injected environment variable for API keys, never commit real secrets.
command = "curl -X POST http://127.0.0.1:9996/graphql -H \"Content-Type: application/json\" -H \"ApiKey: ${API_KEY}\" -d '{\"query\":\"mutation Ping { ping }\"}'"

[job-local "ui-newline-demo"]
schedule = @hourly
command = "printf \"line-one\\nline-two\\nline-three\\n\""
