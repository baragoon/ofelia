name: Renovate
on:
  push:
    branches:
      - master
    paths:
      - .github/renovate.json
      - .github/workflows/renovate.yml
  workflow_dispatch:
    inputs:
      log-level:
        default: info
        type: choice
        options:
          - fatal
          - error
          - warn
          - info
          - debug
      print-config:
        default: false
        type: boolean
        description: Print effective Renovate config in logs

jobs:
  renovate:
    concurrency:
      group: renovate-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      statuses: write
      actions: write
      contents: write
      id-token: write
      pull-requests: write
      issues: write
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.6
        env:
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          LOG_LEVEL: "${{ inputs.log-level || 'info' }}"
          RENOVATE_PRINT_CONFIG: "${{ inputs.print-config || 'false' }}"
        with:
          # Keep Renovate on a single identity and allow workflow-file updates.
          # Set RENOVATE_TOKEN (repo+workflow scope); fallback keeps workflow runnable.
          token: '${{ github.token }}'
