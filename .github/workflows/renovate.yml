name: Renovate
on:
  schedule:
    # The "*" (#42, asterisk) character has special semantics in YAML, so this
    # string has to be quoted.
    - cron: '15 * * * *'
  push:
    branches:
      - master
    paths:
      - .github/renovate.json
      - .github/workflows/renovate.yml
  workflow_dispatch:
    inputs:
      log-level:
        default: info
        type: choice
        options:
          - fatal
          - error
          - warn
          - info
          - debug

jobs:
  renovate:
    concurrency:
      group: renovate-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      statuses: write
      actions: write
      contents: write
      id-token: write
      pull-requests: write
      issues: write
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v43.0.3
        env:
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          LOG_LEVEL: "${{inputs.log-level || 'info'}}"
        with:
          token: '${{ github.token }}'
