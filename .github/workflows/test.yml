name: Test
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go-version: ['stable']
        platform: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: go.sum

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Test
      run: gotestsum --format=github-actions --packages $(go list ./... | grep -v integration)


  integration_test:
    strategy:
      fail-fast: false
      matrix:
        go-version: ['stable']
        platform: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: go.sum

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Integration tests
      working-directory: integration
      run: gotestsum --rerun-fails=3 --format=github-actions
