name: Docker Push
on:
  release:
    types:
      - created
  push:
    branches:
      - master

jobs:
  docker:
    permissions:
      contents: read
      packages: write

    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=development,enable=${{ github.event_name != 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable=true,priority=100,prefix=,suffix=,format=short

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build the Docker image and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
          push: true
          # Keep provenance and sbom disabled for now: when this repo was publishing
          # with docker/build-push-action@v6, GHCR exposed the attestation manifests as
          # extra unknown/unknown package entries. Revisit once GHCR/Buildx no longer
          # surfaces provenance and sbom attestations as separate unknown/unknown
          # architectures for this image.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

