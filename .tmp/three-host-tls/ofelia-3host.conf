[job-exec "pin-dind1"]
schedule = @every 5s
container = pin-target-dind1
command = sh -lc "echo pinned-dind1 >> /tmp/ofelia.log"
docker-host = dind1_2376

[job-exec "pin-dind2"]
schedule = @every 5s
